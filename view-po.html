    <!DOCTYPE html>

    <html>

    <head>
    <title>Purchase Orders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
    <link rel="stylesheet" href="css/style.css">
    </head>

    <body>

       <!-- Navigation Bar -->
<div id="navbar"></div>

    <h1>Purchase Orders</h1>

    <input type="text" id="searchBox" placeholder="Search PO, Customer, Item..." style="width:100%; padding:8px; margin-bottom:15px;">


    <div style="margin-bottom:15px;" class="filter-buttons">
    <button onclick="filterPO('all')">All</button>
    <button onclick="filterPO('pending')">Pending</button>
    <button onclick="filterPO('completed')">Completed</button>
    </div>

    <div class="table-container">
    <table id="poTable">

    <thead>
    <tr>
    <th>PO No</th>
    <th>PO Date</th>
    <th>Customer</th>
    <th>Items</th>
    <th>Ordered Qty</th>
    <th>Unit Price</th>
    <th>Total Order Value</th>
    <th>Pending Qty</th>
    <th>Pending Order Value</th>
    <th>Status</th>
    <th>Actions</th>
    </tr>
    </thead>

    <tbody>

    </tbody>

    </table>
</div>

    <script src="js/navbar.js"></script>
    <script src="js/common.js"></script>
    <script src="js/view-po.js"></script>
    <script src="js/auth.js"></script>

    <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js")
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("SW failed:", err));
}
</script>

</body>

    </html>
