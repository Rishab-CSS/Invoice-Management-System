<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Outgoing Payment Tracker</title>

<link rel="stylesheet" href="css/payment-tracker.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Navigation Bar -->
<div id="navbar"></div>



<h1>Outgoing Payment Tracker</h1>


<!-- Dashboard -->

<div class="customer-dashboard">

<div class="card">
<h3>Total Pending</h3>
<p id="totalPending">₹0</p>
</div>


</div>


<div style="display:flex; align-items:center; gap: 10px; margin-bottom:15px;">

<input
type="text"
id="searchInput"
placeholder="Search Invoice, Vendor, or Month..."
style="padding:8px; width:250px;"
>

<div class="filter-buttons">

<button onclick="loadPayments()">All</button>
<button onclick="filterInvoices('Pending')">Pending</button>
<button onclick="filterInvoices('Paid')">Paid</button>

</div>

</div>


<!-- Payment Table -->

<table class="payment-table">

<thead>

<tr>
<th>Invoice No</th>
<th>Vendor</th>
<th>Invoice Date</th>
<th>Total Amount</th>
<th>Paid Amount</th>
<th>Remaining Amount</th>
<th>Action</th>
</tr>

</thead>

<tbody id="paymentBody"></tbody>

</table>


<!-- PAYMENT PANEL -->

<div id="paymentPanel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#00000066;">

<div style="background:white; padding:25px; width:350px; margin:100px auto; border-radius:8px;">

<h3>Record Payment</h3>

<label>Payment Amount</label>
<input type="number" id="payAmount" style="width:100%; margin-bottom:10px;">

<label>Mode Of Payment</label>

<select id="payMode" style="width:100%; margin-bottom:10px;">
<option>Net Banking</option>
<option>Mobile Banking</option>
<option>UPI</option>
<option>Cash</option>
</select>

<label>Payment Date</label>
<input type="date" id="payDate" style="width:100%; margin-bottom:15px;">

<button onclick="confirmPayment()" class="btn btn-green">Save Payment</button>
<button onclick="closePanel()" class="btn">Cancel</button>

</div>

</div>


<!-- VIEW PAYMENT HISTORY PANEL -->

<!-- VIEW PAYMENT HISTORY PANEL -->

<div id="historyPanel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#00000066;">

<div style="background:white; padding:25px; width:450px; margin:100px auto; border-radius:8px;">

<h3>Payment History</h3>

<table style="width:100%; margin-top:15px; border-collapse:collapse;" border="1">

<thead>
<tr>
<th>SL</th>
<th>Amount</th>
<th>Mode</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="historyList"></tbody>

</table>

<br>

<button onclick="closeHistory()" class="btn">Close</button>

</div>

</div>


<script src="js/navbar.js"></script>
<script src="js/database.js"></script>
<script src="js/outgoing-payment-tracker.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
