<!DOCTYPE html>
<html>
<head>
<title>Create Route Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/route-card.css">

</head>

<body class="route-card-page">

<div id="navbar"></div>

<div class="container">

<h1>Create Route Card</h1>

<div class="grid">

<div class="form-group">
<label>Route Card No</label>
<input type="text" id="rcNo">
</div>

<div class="form-group">
<label>Invoice No</label>
<input type="text" id="rcinvoiceNo" placeholder="Enter Invoice No">
</div>


<div class="form-group">
<label>Customer</label>
<select id="rcCustomer"></select>
</div>

<div class="form-group">
<label>Product</label>
<input type="text" id="rcProduct" list="productList" placeholder="Select or type product">
<datalist id="productList"></datalist>

<!-- 🔥 ADD THIS -->
<input type="hidden" id="productId">

</div>

<div class="form-group">
<label>Part Number</label>
<input type="text" id="rcPartNo">
</div>

<div class="form-group">
<label>Quantity</label>
<input type="number" id="rcQty">
</div>

<div class="form-group">
    <label>PO NO</label>
<input type="text" id="rcPoNo" list="poList" placeholder="Select or type PO No">
<datalist id="poList"></datalist>

<!-- hidden -->
<input type="hidden" id="poId">

</div>

</div>

<h2>Processes</h2>

<div class="table-container">

<table>

                        <thead>
                            <tr>
                                <th style="width: 4%; text-align: center;">SL</th>
                                <th style="width: 15%;">Process</th>
                                <th style="width: 15%;">Machine/Vendor</th>
                                <th style="width: 10%;">Start Date</th>
                                <th style="width: 10%;">End Date</th>
                                <th style="width: 8%;">Produced</th>
                                <th style="width: 8%;">Accepted</th>
                                <th style="width: 8%;">Rework</th>
                                <th style="width: 8%;">Rejected</th>
                                <th style="width: 10%;">Operator</th>
                                <th style="width: 4%;"></th>
                            </tr>
                        </thead>

<tbody id="processRows"></tbody>

</table>

<br>
<button type="button" class="btn" id="addProcessBtn">+ Add Process</button>

</div>

<br>

<button class="btn btn-green" onclick="saveRouteCard()">Save Route Card</button>

</div>

<script src="js/navbar.js"></script>
<script src="js/route-card.js"></script>
<script src="js/auth.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js")
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("SW failed:", err));
}
</script>

</body>
</html>
