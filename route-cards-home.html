<!DOCTYPE html>
<html>
<head>
    <title>Route Cards</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
    <link rel="stylesheet" href="css/style.css">


</head>

<body >

<div id="navbar"></div>

<div class="container">

<h1>Route Cards Module</h1>

<div class="hub-container">

    <!-- CREATE ROUTE CARD -->
    <div class="hub-card" onclick="goToCreateRouteCard()">
        Create Route Cards
    </div>

    <!-- VIEW ROUTE CARD -->
    <div class="hub-card" onclick="goToViewRouteCards()">
        View Route Cards
    </div>

</div>

</div>

<script src="js/navbar.js"></script>
<script src="js/auth.js"></script>

<script>
function goToCreateRouteCard(){
    window.location.href = "create-route-card.html";
}

function goToViewRouteCards(){
    window.location.href = "view-route-cards.html";
}
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js")
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("SW failed:", err));
}
</script>

</body>
</html>
