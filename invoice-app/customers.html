<div class="page-container">

<h2>Customer Management</h2>




<!-- Customer Form -->
<div class="customer-form">
    <input type="text" id="custName" placeholder="Customer Name">
    <textarea id="custAddress" placeholder="Address"></textarea>
    <input type="text" id="custGST" placeholder="GST Number">
    <input type="text" id="custVendor" placeholder="Vendor Code">

    <button id="customerBtn" onclick="addCustomer()">Add Customer</button>
</div>


<!-- Saved Customers Table -->
<h3>Saved Customers</h3>

<table id="customerTable">
<thead>
<tr>
<th>Name</th>
<th>GST</th>
<th>Vendor Code</th>
<th>Actions</th>
</tr>
</thead>

<tbody>
<!-- Customers will load here -->
</tbody>
</table>

</div>


<!-- Scripts -->
<script src="js/customers.js"></script>
