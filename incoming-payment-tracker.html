<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Incoming Payment Tracker</title>
<link rel="stylesheet" href="css/payment-tracker.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

            <!-- Navigation Bar -->
<div id="navbar"></div>



<h1>Incoming Payment Tracker</h1>

<!-- Customer Dashboard -->
<div class="customer-dashboard">

<div class="card">
<h3>Total Pending</h3>
<p id="totalPending">₹0</p>
</div>

<div class="card">
<h3>Total Received</h3>
<p id="totalReceived">₹0</p>
</div>

<div class="card">
<h3>Total Overdue</h3>
<p id="totalOverdue">₹0</p>
</div>

</div>


  <div style="display:flex; align-items:center; gap: 10px; margin-bottom:15px;">

    <input type="text" id="searchInput" class="styled-input" placeholder="Search Invoice, Vendor, or Month..."
      style="padding:10px; width:350px; background:var(--input-bg); color:var(--text-main); border:1px solid var(--border); border-radius:4px;">

    <div class="filter-buttons">

      <button onclick="filterInvoices('all')">All</button>
      <button onclick="filterInvoices('Pending')">Pending</button>
      <button onclick="filterInvoices('Received')">Received</button>
      <button onclick="filterInvoices('Overdue')">Overdue</button>

    </div>

  </div>

<!-- Payment Table -->

<table class="payment-table">

<thead>

<tr>
<th>Invoice No</th>
<th>Customer</th>
<th>Invoice Date</th>
<th>Amount</th>
<th>Due Date</th>
<th>Pending Amount</th>
<th>Overdue</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="paymentBody">

<!-- rows will come from JS -->

</tbody>

</table>


<div id="paymentPanel" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:1500;">

<div class="modal-box" style="padding:25px; width:350px; margin:100px auto; border-radius:4px;">

<h3>Receive Payment</h3>

<label>Payment Amount</label>
<input type="number" id="payAmount" style="width:100%; margin-bottom:10px; background:var(--input-bg); color:var(--text-main); border:1px solid var(--border); padding:8px;">

<label>Mode Of Payment</label>

<select id="payMode" style="width:100%; margin-bottom:10px; background:var(--input-bg); color:var(--text-main); border:1px solid var(--border); padding:8px;">
<option>Net Banking</option>
<option>Mobile Banking</option>
<option>UPI</option>
<option>Cash</option>
</select>

<label>Payment Date</label>
        <input type="date" id="payDate" onclick="this.showPicker && this.showPicker()" onfocus="this.showPicker && this.showPicker()" style="width:100%; margin-bottom:15px; background:var(--input-bg); color:var(--text-main); border:1px solid var(--border); padding:8px;">
<div style="display:flex; gap:10px;">
<button onclick="confirmPayment()" class="btn btn-green">Save Payment</button>
<button onclick="closePanel()" class="btn">Cancel</button>
</div>

</div>

</div>


<div id="historyPanel" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:1500;">

<div class="modal-box" style="padding:25px; width:760px; margin:100px auto; border-radius:4px;">

<h3>Payment History</h3>

<table style="width:100%; margin-top:15px; border-collapse:collapse;">

<thead>
<tr>
<th style="background:var(--surface); color:var(--text-sec); padding:8px; border-bottom:1px solid var(--border);">SL</th>
<th style="background:var(--surface); color:var(--text-sec); padding:8px; border-bottom:1px solid var(--border);">Amount</th>
<th style="background:var(--surface); color:var(--text-sec); padding:8px; border-bottom:1px solid var(--border);">Mode</th>
<th style="background:var(--surface); color:var(--text-sec); padding:8px; border-bottom:1px solid var(--border);">Date</th>
<th style="background:var(--surface); color:var(--text-sec); padding:8px; border-bottom:1px solid var(--border);">Action</th>
</tr>
</thead>

<tbody id="historyList"></tbody>

</table>

<br>

<button onclick="closeHistory()" class="btn">Close</button>

</div>

</div>



<script src="js/navbar.js"></script>
<script src="js/database.js"></script>
<script src="js/incoming-payment-tracker.js"></script>
<script src="js/auth.js"></script>


</body>
</html>
