<!DOCTYPE html>
<html>

<head>
<title>Admin Login</title>
<link rel="stylesheet" href="css/style.css">
<style>
.login-box{
max-width:400px;
margin:100px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.login-box h2{
margin-bottom:20px;
text-align:center;
}

.login-box input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

.login-btn{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.login-btn:hover{
opacity:0.9;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button class="login-btn" onclick="login()">Login</button>

<p id="error" style="color:red; display:none;">Invalid Login</p>

</div>

<script src="js/login.js"></script>

</body>

</html>
