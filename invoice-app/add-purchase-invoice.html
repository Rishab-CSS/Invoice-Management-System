<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Add Purchase Invoice</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="navbar"></div>

<div class="container">

<h1>Add Purchase Invoice</h1>

<form id="purchaseForm">

<div class="grid">

<div class="form-group">
<label>Invoice No</label>
<input type="text" id="invoiceNo">
</div>

<div class="form-group">
<label>Date</label>
<input type="date" id="date">
</div>

</div>


<div class="form-group">
<label>Vendor</label>
<input type="text" id="vendor" placeholder="Vendor Name">
</div>


<div class="form-group">
<label>Amount</label>
<input type="number" id="amount" placeholder="Invoice Amount">
</div>

<br>

<button type="button" class="btn btn-green" onclick="savePurchaseInvoice()">
Save Purchase Invoice
</button>

</form>

</div>

<script src="js/navbar.js"></script>
<script src="js/database.js"></script>
<script src="js/auth.js"></script>
<script src="js/purchase-invoice.js"></script>

</body>

</html>
